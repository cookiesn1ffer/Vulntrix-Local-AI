name: Tests

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_endpoints.py
        # test_endpoints.py needs FastAPI/Pydantic runtime — run separately below

      - name: Run endpoint tests
        run: pytest tests/test_endpoints.py -v --tb=short
        continue-on-error: true   # Ollama not available in CI; endpoint tests may skip

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: |
            .pytest_cache/
          retention-days: 7

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff
        run: ruff check . --select E,W,F --ignore E501,F401,F811
        # E501 = line length, F401 = unused import (intentional in some files)
        continue-on-error: true   # lint failures are warnings, not blockers

  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (no push)
        run: docker build -t vulntrix:ci-check .
